# tinyproxy egress allowlist for triagepack sandbox.
# Only listed hosts can be reached from the agent container.
# To extend: add another `Filter` entry below and rebuild the proxy image.

Port 8888
Listen 0.0.0.0
Timeout 30
DefaultErrorFile "/etc/tinyproxy/default.html"
LogLevel Warning
MaxClients 50

# CONNECT method allowed only on 443 — no plaintext egress.
ConnectPort 443

# Allowlist file lives next to this config; one host per line.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterURLs Off
FilterExtended On
FilterCaseSensitive No
