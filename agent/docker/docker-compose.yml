services:
  triagepack:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: triagepack:0.1.0-dev
    read_only: true
    tmpfs:
      - /tmp:size=100m
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    user: "10001:10001"
    networks:
      - sandbox
    ports:
      - "8081:8081"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      SLACK_CHANNEL_ID: ${SLACK_CHANNEL_ID}
      LOKI_URL: ${LOKI_URL:-}
      DATADOG_API_KEY: ${DATADOG_API_KEY:-}
      DATADOG_APP_KEY: ${DATADOG_APP_KEY:-}
      NOTION_TOKEN: ${NOTION_TOKEN:-}
      RUNBOOK_DIR: ${RUNBOOK_DIR:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Force all outbound HTTPS through the egress proxy. Anything not on the
      # allowlist (docker/filter) gets a 403 from tinyproxy.
      HTTPS_PROXY: "http://egress-proxy:8888"
      HTTP_PROXY: "http://egress-proxy:8888"
      NO_PROXY: "localhost,127.0.0.1"
    depends_on:
      - egress-proxy
    restart: unless-stopped

  egress-proxy:
    image: kalaksi/tinyproxy:1.11.1
    read_only: true
    tmpfs:
      - /var/log/tinyproxy:size=10m
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    networks:
      sandbox:
        aliases: [egress-proxy]
    volumes:
      - ./proxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./filter:/etc/tinyproxy/filter:ro
    restart: unless-stopped

networks:
  sandbox:
    driver: bridge
    # Internal: false because the proxy needs egress to the public internet.
    # The agent container itself never reaches the public internet directly —
    # it only sees the egress-proxy alias, which enforces the allowlist.
    internal: false
